<!DOCTYPE html>
<html lang="en">
<head>
	<script type="text/javascript" src="scripts/client.js"></script>
	<script type="text/javascript" src="scripts/db.js"></script>
	<script type="text/javascript" src="scripts/upload.js"></script>

	<script>
		// Prevent default browser behaviour of opening a file when dropped anywhere on page
		document.addEventListener("dragover", function(event) {
			event.preventDefault()
		})
		document.addEventListener("drop", function(event) {
			event.preventDefault()
		})
	</script>

	<!--Can be moved to global.css if dropbox added to more places than this page-->
	<style>
		#dropbox {
			background-color: #f9f9f9;
			padding: 20px;
			min-width: 500px;
			height: 200px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 12px;
			cursor: copy;
			border: 2px dashed lightgrey;
			box-sizing: border-box;
			border-radius: 6px;
			text-align: center;
			overflow: hidden;
		}
		#dropbox:hover {
			border-color: #777 !important;
		}
		#dropbox.dragover {
			border-color: #777;
			cursor: copy;
		}
		#dropbox.valid {
			border-color: #339933;
		}
		#dropbox.invalid {
			border-color: #f05c62;
		}
		#dropbox.invalid.dragover, #dropbox.valid.dragover {
			border-color: #777 !important;
		}
	</style>

	<title>Images, Audio, Video, Documents</title>
</head>

<body>
	<!-- <div class="formpage" align="center"> -->
	<div class="form-container form-container--medium">

		<h1>Upload Image, Audio, Video, Documents</h1>
		<!-- <button class="exodusbutton" style="display: none" id="button_showupload">
			Upload
		</button> -->

		<div class="card-row">
			<div class="card-cell">
				<div class="card">
					<button class="exodusbutton" style="display: none; width: 50px" id="button_showupload">
						Upload
					</button>
					<form enctype="multipart/form-data" target="_parent" action="../exodus/upload.php" method="post" id="form1">
						<table class="exodusform" id="table_upload" style="display: none">

							<!--SECTION 1 - UPLOAD-->
							<tbody class="section">
								<tr>
									<td class="section-title">
										<!-- <img src="../../exodus/images/theme2/formpage_uploadfile.webp" /> -->
										<br>Upload file
									</td>
									<td colspan="2">
										<!--Hidden old browse button-->
										<input id="filedata" name="filedata" type="file" onchange="previewimage_sync(this)" style="display:none;" />

										<div id="dropbox" onclick="document.getElementById('filedata').click()" ondragover="highlight_dropbox(event)" ondragleave="unhighlight_dropbox()" ondrop="upload_ondrop(event)">
											<span style="color: #999; font-family: monospace; font-size: 12px; font-style: italic;">Click to browse for a file<br>Or drag & drop it here<br><br><br></span>
										</div>
										<span style="font-family: monospace; font-size: 10px; color: #555; margin-top: 5px; display: block;">
											Supported file formats: <br>
											<span style="font-family: monospace; font-size: 10px; color: #555;" id="audiovisualextensionselement"></span>
										</span>
									</td>
								</tr>
								<tr>
									<td>
									</td>
									<td style="text-align:center; vertical-align:middle; padding:10px;">
<!--										<input id="button_submit" class="exodusbutton" type="button" value="Upload" accesskey="2" title="Upload (Alt+2)" />-->
<!--										<button class="exodusbutton" onclick="window.close()" title="Close window (Esc)">Close</button>-->
										<!--made both buttons to use <button> element as it is the cleaner route to insert an icon/image as the button if we wanted to go that route in the future--->
										<button id="button_submit" class="exodusbutton" onclick="yield* upload_onclick" title="Close window (Esc)">Upload</button>
										<button id="button_close"  class="exodusbutton" onclick="window.close()" title="Close window (Esc)">Close</button>
									</td>
									<span style="margin-left: 2.5px; display:none;" id="uploadpathtext"></span>
								</tr>
							</tbody>

							<!--SECTION 2 - PREVIEW-->
							<tbody class="section">
								<tr>
									<td class="section-title">
										<!-- <img src="../../exodus/images/theme2/formpage_uploadpreview.webp" /> -->
										<br>Preview
										<br><span id="thumbnail_size_span"></span>
									</td>
									<td colspan="2">
										<img id="thumbnail" src="" alt="" />
									</td>
								</tr>
								<tr style="display: none">
									<td>
									</td>
									<td>
										<button exodusonclick="yield* loadimages()" class="exodusbutton">
											Refresh
										</button>
									</td>
								</tr>
							</tbody>
						</table>

						<span style="display: none">
							<br />
							Destination URL:
							<input id="pathdata" name="pathdata" value="" />
							<br />
							Destination File:
							<input id="filename" name="filename" value="" />
							<br />
							Response URL:
							<input id="redirectpage" name="redirectpage" value="" />
							<br />
						</span>

					</form>
				</div> <!--card-->
			</div> <!--card-cell-->
		</div> <!--card-row-->

		<div id="images" style="align-items: center;"></div>
	<!-- </div> formpage -->
	</div> <!--form-conatiner-->
</body>

</html>
